/* Shared helper: reset chart wrap to a fresh canvas */
function _resetMLWrap(sid) {
  const wrap = document.getElementById(`ml-wrap-${sid}`);
  if (!wrap) return null;
  wrap.innerHTML = `<canvas id="chart-canvas-${sid}"></canvas>`;
  return document.getElementById(`chart-canvas-${sid}`);
}

function initCorrChart(card) {
  const sid    = card.id;
  const method = card.opts.mlTab || 'corr';
  const target = document.getElementById(`ml-target-${sid}`)?.value
    || card.opts.target
    || CONFIG?.analysis?.correlation_targets?.[0] || 'views';
  const topN   = parseInt(document.getElementById(`ml-topn-${sid}`)?.value || '15');
  const dir    = document.getElementById(`ml-dir-${sid}`)?.value || 'all';
  const fgroup = document.getElementById(`ml-fgroup-${sid}`)?.value || 'all';

  // Always restore canvas before rendering
  const canvas = _resetMLWrap(sid);
  if (!canvas) return;

  if (!ML_INSIGHTS) {
    document.getElementById(`ml-wrap-${sid}`).innerHTML =
      `<div class="cc-empty"><div>📊</div><div>No ML insights</div><div><code>AI/pipeline.py</code></div></div>`;
    return;
  }

  /* ── Pull raw entries per method ── */
  let entries = [];   // { feat, val }
  let xAxisLabel = '';
  let tooltipFn  = v => v.toFixed(3);

  if (method === 'corr') {
    const raw = (ML_INSIGHTS.correlations || {})[target] || {};
    entries = Object.entries(raw)
      .filter(([,v]) => v?.spearman_r != null)
      .map(([f,v]) => ({ feat: f, val: v.spearman_r }));
    xAxisLabel = 'Spearman r';
    tooltipFn  = v => `r = ${v>=0?'+':''}${v.toFixed(3)}`;

  } else if (method === 'lasso') {
    /* ml_insights.lasso[target].coefficients = { feature: number } */
    const lassoBlock = (ML_INSIGHTS.lasso || {})[target] || {};
    const raw = lassoBlock.coefficients || {};
    entries = Object.entries(raw)
      .filter(([,v]) => v != null && v !== 0)
      .map(([f,v]) => ({ feat: f, val: v }));
    xAxisLabel = 'Lasso coefficient';
    tooltipFn  = v => `coef = ${v>=0?'+':''}${v.toFixed(2)}`;

  } else if (method === 'rf') {
    /* ml_insights.random_forest[target].feature_importances = { feature: number } */
    const rfBlock = (ML_INSIGHTS.random_forest || {})[target] || {};
    const raw = rfBlock.feature_importances || {};
    entries = Object.entries(raw)
      .filter(([,v]) => v != null)
      .map(([f,v]) => ({ feat: f, val: v }));
    xAxisLabel = 'RF importance';
    tooltipFn  = v => `importance = ${v.toFixed(4)}`;
  }

  /* ── Feature group filter ── */
  if (fgroup !== 'all' && Object.keys(FEAT_GROUP_MAP).length) {
    entries = entries.filter(e => FEAT_GROUP_MAP[e.feat] === fgroup);
  }

  /* ── Direction filter ── */
  if (dir === 'pos') entries = entries.filter(e => e.val > 0);
  if (dir === 'neg') entries = entries.filter(e => e.val < 0);

  /* ── Sort by absolute value, limit ── */
  entries.sort((a,b) => Math.abs(b.val) - Math.abs(a.val));
  entries = entries.slice(0, topN);

  if (!entries.length) {
    const groupNote = fgroup !== 'all' ? ` in ${fmtLabel(fgroup)}` : '';
    document.getElementById(`ml-wrap-${sid}`).innerHTML =
      `<div class="cc-empty"><div>No data for <strong>${fmtLabel(target)}</strong>${groupNote} · ${method.toUpperCase()}</div>
       <div style="font-size:10px;opacity:.55;margin-top:4px">Run <code>AI/pipeline.py</code> to populate</div></div>`;
    return;
  }

  /* ── Render chart ── */
  const labels = entries.map(e => fmtFeatureName(e.feat));
  const values = entries.map(e => e.val);
  const isRF   = method === 'rf';
  const colors = values.map(v => isRF || v>=0 ? 'rgba(124,106,247,.7)' : 'rgba(239,68,68,.7)');
  const bords  = values.map(v => isRF || v>=0 ? 'rgb(124,106,247)'     : 'rgb(239,68,68)');

  if (CHART_INSTANCES[sid]) CHART_INSTANCES[sid].destroy();
  CHART_INSTANCES[sid] = new Chart(canvas, {
    type: 'bar',
    data: { labels, datasets:[{data:values,backgroundColor:colors,
                               borderColor:bords,borderWidth:1,borderRadius:4}] },
    options: {
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false},
        tooltip:{callbacks:{label:ctx => ` ${tooltipFn(ctx.raw)}`}} },
      scales:{
        x:{ min: isRF ? 0 : undefined,
            grid:{color:'rgba(255,255,255,.05)'},
            ticks:{color:'#94a3b8',font:{size:10}},
            title:{display:true,text:xAxisLabel,color:'#94a3b8',font:{size:9}} },
        y:{ grid:{display:false}, ticks:{color:'#e2e4f0',font:{size:10}} }
      }
    }
  });
}

function toggleMLDd(btnEl) {
  const dd = btnEl.closest('.ml-dd');

  document.querySelectorAll('.ml-dd.open, .ml-dd.visible').forEach(d => {

  });
  if (!wasOpen) {
    // Frame 1: make panel visible (display:block) so browser computes layout
    dd.classList.add('visible');

function initTrendChart(card) {
  const metric  = card.opts.metric || 'views';
  const canvas  = document.getElementById(`chart-canvas-${card.id}`);
  if (!canvas) return;

  if (!VIDEOS.length) {
    canvas.closest('.cc-chart-wrap').innerHTML =
      `<div class="cc-empty"><div>📈</div><div>No video data</div></div>`;
    return;
  }

  const dateField = CONFIG?.data?.schema?.date || 'published_at';
  const monthly   = {};
  VIDEOS.forEach(v => {
    const d = new Date(v[dateField]);
    if (isNaN(d)) return;
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!monthly[key]) monthly[key] = [];
    const val = parseFloat(v[metric]);
    if (!isNaN(val)) monthly[key].push(val);
  });

  const labels = Object.keys(monthly).sort();
  if (!labels.length) {
    canvas.closest('.cc-chart-wrap').innerHTML = `<div class="cc-empty"><div>No date data</div></div>`;
    return;
  }

  const values = labels.map(k => { const a=monthly[k]; return a.reduce((x,y)=>x+y,0)/a.length; });
  const counts = labels.map(k => monthly[k].length);
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#a78bfa';

  if (CHART_INSTANCES[card.id]) CHART_INSTANCES[card.id].destroy();
  CHART_INSTANCES[card.id] = new Chart(canvas, {
    type:'line',
    data:{labels, datasets:[
      {label:fmtLabel(metric),data:values,borderColor:accent,
       backgroundColor:'rgba(124,106,247,.1)',borderWidth:2,
       pointRadius:3,fill:true,tension:.35,yAxisID:'y'},
      {label:'Videos published',data:counts,
       borderColor:'rgba(100,116,139,.5)',backgroundColor:'transparent',
       borderWidth:1.5,borderDash:[4,3],pointRadius:2,fill:false,tension:.2,yAxisID:'y2'}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:true,labels:{color:'#94a3b8',font:{size:10},boxWidth:12}},
        tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.datasetIndex===0?fmtCompact(ctx.raw):ctx.raw}`}}
      },
      scales:{
        x: {grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#94a3b8',font:{size:10},maxTicksLimit:10}},
        y: {position:'left',grid:{color:'rgba(255,255,255,.05)'},
            ticks:{color:'#94a3b8',font:{size:10},callback:v=>fmtCompact(v)}},
        y2:{position:'right',grid:{display:false},ticks:{color:'#64748b',font:{size:10}}}
      }
    }
  });
}

/* ── Post-processing: auto-surface cards from Calliope responses ──── */
function postProcessResponse(text) {
  const t = text.toLowerCase();
  // Correlations → correlation chart (also re-render features explorer)
  if (t.match(/correlat|predictor|feature.?import|driver|lasso|coefficient/)) {
    emitCard('corr-chart', {});
    emitCard('features-explorer', {});
  }
  // Trends
  if (t.match(/trend|over.time|month|week|season|growth pattern/)) {
    emitCard('trend-chart', {});
  }
  // Videos
  if (t.match(/top video|best.?perform|most.?viewed|viral|episode|thumbnail/)) {
    emitCard('video-browser', {});
  }
  // Hypotheses
  if (t.match(/hypothesis|p.value|statistical.?signif|mann.?whitney|cohen.?d|effect.size/)) {
    emitCard('hypothesis', {});
  }
  // Metrics
  if (t.match(/total video|total views|average retention|here are.*(stat|metric|number)/)) {
    emitCard('metrics-row', {});
  }

  // After-render: if features-explorer card exists, re-render its rows
  const featCard = CANVAS_CARDS.find(c => c.type === 'features-explorer');
  if (featCard) setTimeout(() => renderFeatRows(featCard.id), 100);

  // If video-browser card exists, ensure it renders
  const vbrCard = CANVAS_CARDS.find(c => c.type === 'video-browser');
  if (vbrCard) setTimeout(() => renderVbrGrid(vbrCard.id), 100);
}


/* ═══════════════════════════════════════════════════════════════════════
   DRAG-TO-RESIZE
   ═══════════════════════════════════════════════════════════════════════ */
function initResizer() {
  const divider=document.getElementById('pane-divider');
  const leftPane=document.getElementById('left-pane');
  const appBody=document.getElementById('app-body');
  let dragging=false, startX, startW;
  divider.addEventListener('mousedown', e=>{
    dragging=true; startX=e.clientX;
    startW=leftPane.getBoundingClientRect().width;
    divider.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e=>{
    if (!dragging) return;
    const total=appBody.getBoundingClientRect().width;
    const newW=Math.min(Math.max(startW+(e.clientX-startX),280),total-300);
    leftPane.style.flex=`0 0 ${newW}px`;
    Object.values(CHART_INSTANCES).forEach(c=>c.resize());
  });
  document.addEventListener('mouseup', ()=>{
    if (!dragging) return;
    dragging=false;
    divider.classList.remove('dragging');
    document.body.style.cursor='';
    document.body.style.userSelect='';
  });
}


/* ═══════════════════════════════════════════════════════════════════════
   CALLIOPE CHAT
   ═══════════════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  const ta=document.getElementById('chat-input');
  if (ta) {
    ta.addEventListener('input', ()=>{
      ta.style.height='auto';
      ta.style.height=Math.min(ta.scrollHeight,120)+'px';
    });
    ta.addEventListener('keydown', e=>{
      if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}
    });
  }
  document.getElementById('send-btn').addEventListener('click', handleSend);
});

function handleSend() {
  const text=document.getElementById('chat-input').value.trim();
  if (!text||IS_STREAMING) return;
  sendMessage(text);
}

async function sendMessage(text) {
  if (IS_STREAMING) return;
  document.getElementById('chat-welcome').classList.add('hidden');
  const msgs=document.getElementById('chat-messages');
  msgs.style.display='flex';
  const ta=document.getElementById('chat-input');
  ta.value=''; ta.style.height='auto';
  appendBubble('user', text);
  CHAT_HISTORY.push({role:'user',content:text});
  const typingId=appendTyping();
  IS_STREAMING=true;
  document.getElementById('send-btn').disabled=true;
  try {
    const response=await callClaudeStream(text, chunk=>updateTyping(typingId,chunk));
    finaliseTyping(typingId, response);
    CHAT_HISTORY.push({role:'assistant',content:response});
  } catch(e) {
    finaliseTyping(typingId, `*Error: ${e.message}*`);
  } finally {
    IS_STREAMING=false;
    document.getElementById('send-btn').disabled=false;
    document.getElementById('chat-input').focus();
  }
}

function appendBubble(role, text) {
  const msgs=document.getElementById('chat-messages');
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  div.innerHTML=`<div class="msg-avatar">${role==='assistant'?'✦':'→'}</div>
    <div class="msg-bubble">${role==='assistant'?marked.parse(text):escHtml(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}

function appendTyping() {
  const msgs=document.getElementById('chat-messages');
  const id='typing-'+Date.now();
  const div=document.createElement('div');
  div.className='msg assistant'; div.id=id;
  div.innerHTML=`<div class="msg-avatar">✦</div>
    <div class="msg-bubble msg-typing">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return id;
}

function updateTyping(id, fullText) {
  const el=document.getElementById(id);
  if (!el) return;
  el.querySelector('.msg-bubble').innerHTML=marked.parse(fullText);
  document.getElementById('chat-messages').scrollTop=9999;
}

function finaliseTyping(id, fullText) {
  const el=document.getElementById(id);
  if (!el) return;
  el.querySelector('.msg-bubble').innerHTML=marked.parse(fullText);
  document.getElementById('chat-messages').scrollTop=9999;
  postProcessResponse(fullText);
}

/* ── Claude API ───────────────────────────────────────────────────── */
function buildSystemPrompt() {
  let sys=`You are Calliope, an AI analyst for ${CONFIG?.project?.name||'this project'}. You are data-driven, sharp, and concise.`;
  if (ML_INSIGHTS) {
    sys+=`\n\nML CONTEXT:\n${JSON.stringify({
      summary:ML_INSIGHTS.summary_text,top_findings:ML_INSIGHTS.top_findings,
      n_videos:ML_INSIGHTS.n_videos,targets:ML_INSIGHTS.targets},null,2)}`;
  }
  return sys;
}

async function callClaudeStream(userText, onChunk) {
  const key   =localStorage.getItem('anthropic_api_key')||localStorage.getItem('anthropicKey')||'';
  const model =CONFIG?.calliope?.model||'claude-sonnet-4-6';
  const history=CHAT_HISTORY.slice(-12);
  const body  =JSON.stringify({model,max_tokens:1024,system:buildSystemPrompt(),messages:history,stream:true});
  ACTIVE_CTRL=new AbortController();
  const r=(!IS_PROD&&key)
    ?await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',signal:ACTIVE_CTRL.signal,
        headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01',
                 'x-api-key':key,'anthropic-dangerous-direct-browser-access':'true'},body})
    :await fetch(PROXY,{method:'POST',signal:ACTIVE_CTRL.signal,
        headers:{'Content-Type':'application/json'},body});
  return readSSEStream(r,onChunk);
}

async function readSSEStream(response,onChunk) {
  if (!response.ok) {
    const err=await response.json().catch(()=>({error:{message:`HTTP ${response.status}`}}));
    throw new Error(err?.error?.message||`HTTP ${response.status}`);
  }
  const reader=response.body.getReader();
  const dec=new TextDecoder();
  let fullText='',buf='';
  while(true) {
    const{value,done}=await reader.read();
    if (done) break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split('\n'); buf=lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data=line.slice(6).trim();
      if (data==='[DONE]') break;
      try {
        const p=JSON.parse(data);
        const delta=p.delta?.text||p.choices?.[0]?.delta?.content||'';
        if (delta){fullText+=delta;onChunk(fullText);}
      } catch(_){}
    }
  }
  return fullText;
}

async function callClaude(prompt,{temperature=0.7,maxTokens=800,system=true}={}) {
  const key  =localStorage.getItem('anthropic_api_key')||localStorage.getItem('anthropicKey')||'';
  const model=CONFIG?.calliope?.model||'claude-sonnet-4-6';
  const sys  =system?buildSystemPrompt():'You are a helpful creative strategist.';
  const bodyObj={model,max_tokens:maxTokens,system:sys,temperature,messages:[{role:'user',content:prompt}]};
  const r=(!IS_PROD&&key)
    ?await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01',
                 'x-api-key':key,'anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify(bodyObj)})
    :await fetch(PROXY,{method:'POST',
        headers:{'Content-Type':'application/json'},body:JSON.stringify(bodyObj)});
  if (!r.ok){const e=await r.json().catch(()=>{});throw new Error(e?.error?.message||`HTTP ${r.status}`);}
  const data=await r.json();
  return data.content?.[0]?.text||'';
}


/* ── Status helpers ───────────────────────────────────────────────── */
async function checkAPIStatus() {
  const dot=document.getElementById('top-status-dot');
  const lbl=document.getElementById('top-status-label');
  if (IS_PROD){dot.className='ok';lbl.textContent='Proxy';return;}
  const key=localStorage.getItem('anthropic_api_key')||localStorage.getItem('anthropicKey')||'';
  if (key){dot.className='ok';lbl.textContent='API key set';}
  else    {dot.className='err';lbl.textContent='No API key';}
}
function setStatus(state,text) {
  document.getElementById('top-status-dot').className=state==='ok'?'ok':state==='err'?'err':'';
  document.getElementById('top-status-label').textContent=text;
}


/* ── Utilities ────────────────────────────────────────────────────── */
async function loadCSV(url) {
  return new Promise((resolve,reject)=>{
    Papa.parse(url,{download:true,header:true,skipEmptyLines:true,
      complete:r=>resolve(r.data),error:e=>reject(new Error(e.message))});
  });
}
function fmtCompact(n){
  if(isNaN(n)||n==null)return'—';
  if(n>=1e9)return(n/1e9).toFixed(1)+'B';
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return Math.round(n).toString();
}
const LABEL_MAP = {
  outlier_spike_score: 'Outlier Spike Score',
  outlier_retention_score: 'Outlier Retention Score',
  outlier_potential: 'Outlier Potential',
  avg_view_percentage: 'Avg View %',
  retention_30s: 'Retention 30s',
  subscribers_gained: 'Subscribers Gained',
  cpm: 'CPM',
};
function fmtLabel(str){return LABEL_MAP[str]||(str||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}
function fmtFeatureName(str){
  return(str||'').replace(/_/g,' ')
    .replace(/\b(thumb|title|wpm|avg|pct|std|nlp)\b/g,s=>s.toUpperCase());
}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
