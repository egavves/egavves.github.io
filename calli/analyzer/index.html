<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calli Analyzer — Projects</title>
  <link rel="stylesheet" href="../dashboards/calli-system.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Top bar ── */
    #top-bar {
      flex-shrink: 0; height: var(--nav-h);
      display: flex; align-items: center; gap: 12px; padding: 0 20px;
      background: var(--bg-alt); border-bottom: 1px solid var(--border);
    }
    #top-wordmark { font-size: 15px; font-weight: 800; color: var(--brand); letter-spacing: -.01em; }
    #top-product  { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; background: var(--surface2); padding: 2px 8px; border-radius: 4px; }
    .top-spacer   { flex: 1; }
    #switch-explorer {
      font-size: 11.5px; color: var(--muted); cursor: pointer;
      border: 1px solid var(--border); border-radius: var(--r-md); padding: 4px 12px;
      background: none; transition: border-color .15s, color .15s;
    }
    #switch-explorer:hover { border-color: var(--accent); color: var(--text); }

    /* ── Main ── */
    #main { flex: 1; overflow-y: auto; padding: 40px 40px 80px; }
    #main::-webkit-scrollbar { width: 4px; }
    #main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── Hero ── */
    #hero { margin-bottom: 36px; }
    #hero-title { font-size: 26px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    #hero-title span { color: var(--brand); }
    #hero-sub { font-size: 14px; color: var(--muted); max-width: 480px; line-height: 1.6; }

    /* ── Search ── */
    #search-wrap { margin-bottom: 28px; }
    #project-search {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 24px; padding: 9px 18px; font-size: 13px;
      color: var(--text); outline: none; width: min(400px, 100%);
      transition: border-color .15s;
    }
    #project-search:focus { border-color: rgba(124,106,247,.5); }
    #project-search::placeholder { color: var(--muted); }

    /* ── Grid ── */
    #project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    /* ── Project card ── */
    .pcard {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; cursor: pointer;
      transition: transform .15s, border-color .15s, box-shadow .15s;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column;
      animation: fadeUp .3s ease both;
    }
    .pcard:hover {
      transform: translateY(-3px);
      border-color: rgba(124,106,247,.4);
      box-shadow: 0 10px 32px rgba(0,0,0,.45);
    }
    .pcard-banner {
      height: 80px; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .pcard-icon { font-size: 36px; z-index: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,.4)); }
    .pcard-body { padding: 14px 16px 16px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .pcard-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .pcard-tagline { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .pcard-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .pcard-date { font-size: 10.5px; color: var(--muted2); }
    .pcard-badge {
      font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      padding: 2px 7px; border-radius: 10px; background: var(--surface2); color: var(--muted);
    }
    .pcard-badge.has-data { background: rgba(52,211,153,.12); color: var(--positive); }

    /* ── New project card ── */
    .pcard-new {
      background: var(--surface); border: 2px dashed var(--border);
      border-radius: 14px; min-height: 160px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; cursor: pointer; transition: border-color .15s;
      text-decoration: none; color: var(--muted);
    }
    .pcard-new:hover { border-color: var(--accent); color: var(--text); }
    .pcard-new-icon { font-size: 28px; }
    .pcard-new-label { font-size: 13px; font-weight: 600; }
    .pcard-new-hint { font-size: 11px; color: var(--muted2); }

    /* ── Empty / Error states ── */
    #error-state { display: none; padding: 48px; text-align: center; color: var(--muted); }
    #loading-state { padding: 48px; text-align: center; color: var(--muted); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div id="top-bar">
    <span id="top-wordmark">Calli</span>
    <span id="top-product">Analyzer</span>
    <div class="top-spacer"></div>
    <button id="switch-explorer" onclick="location.href='../explorer/index.html'">Switch to Explorer →</button>
  </div>

  <!-- Main content -->
  <div id="main">
    <div id="hero">
      <div id="hero-title"><span>Analyze</span> your content</div>
      <div id="hero-sub">Each project is a YouTube channel or dataset you own. Upload your data, run the pipeline, then ask Calliope anything.</div>
    </div>

    <div id="search-wrap">
      <input id="project-search" type="text" placeholder="Search projects…" oninput="filterProjects(this.value)">
    </div>

    <div id="loading-state">Scanning projects…</div>
    <div id="error-state"></div>
    <div id="project-grid" style="display:none;"></div>
  </div>

  <script>
  /* ═══════════════════════════════════════════════════════════════════════
     CALLI ANALYZER — Project Launcher
     Scans projects/*/config.json → renders project cards
     ═══════════════════════════════════════════════════════════════════════ */

  // Known project IDs — since we can't scan directories from JS,
  // we probe known paths + a manifest if available.
  // Strategy:
  //   1. Try to fetch projects/_manifest.json (optional, lists all project IDs)
  //   2. Fall back to probing known project IDs from SEED_PROJECTS
  //   3. Every valid config.json found becomes a card

  const SEED_PROJECTS = ['cut', '_template'];

  /* ── Inline registry so the page works with file:// (no fetch/CORS) ── */
  const INLINE_PROJECTS = [
    {
      id: 'cut',
      cfg: {
        project: {
          id: 'cut', name: 'CUT Analytics',
          tagline: 'YouTube performance intelligence for Cut.com — 482 videos',
          type: 'analyzer', created: '2026-03-19',
          accent: '#a78bfa', gradient: ['#a78bfa', '#c4b5fd'], icon: '🎬'
        },
        data: { files: { ml_insights: 'data/ml_insights.json' } }
      },
      hasData: true
    }
  ];

  let ALL_PROJECTS = [];

  async function loadProjects() {
    /* Try fetch-based discovery first (works on http://) */
    if (location.protocol !== 'file:') {
      let ids = [...SEED_PROJECTS];
      try {
        const r = await fetch('./projects/_manifest.json');
        if (r.ok) { const m = await r.json(); ids = [...new Set([...m.projects || [], ...ids])]; }
      } catch (_) {}
      const results = await Promise.allSettled(
        ids.filter(id => id !== '_template').map(async id => {
          const r = await fetch(`./projects/${id}/config.json`);
          if (!r.ok) return null;
          const cfg = await r.json();
          let hasData = false;
          try { const dr = await fetch(`./projects/${id}/${cfg.data.files.ml_insights}`, { method: 'HEAD' }); hasData = dr.ok; } catch (_) {}
          return { id, cfg, hasData };
        })
      );
      ALL_PROJECTS = results.filter(r => r.status === 'fulfilled' && r.value).map(r => r.value);
    }
    /* Fall back to inline registry for file:// */
    if (!ALL_PROJECTS.length) ALL_PROJECTS = INLINE_PROJECTS;
    renderGrid(ALL_PROJECTS);
  }


  function renderGrid(projects) {
    document.getElementById('loading-state').style.display = 'none';
    const grid = document.getElementById('project-grid');
    grid.style.display = 'grid';

    if (!projects.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--muted)">No projects found. Create one by copying projects/_template/config.json.</div>`;
      renderNewCard(grid);
      return;
    }

    grid.innerHTML = projects.map((p, i) => projectCard(p, i)).join('') + newCard();
  }

  function projectCard({ id, cfg, hasData }, idx) {
    const p        = cfg.project;
    const bg       = p.gradient
      ? `background: linear-gradient(135deg, ${p.gradient[0]}22, ${p.gradient[1]}44)`
      : `background: var(--surface2)`;
    const created  = p.created ? new Date(p.created).toLocaleDateString('en-US', { month: 'short', year: 'numeric' }) : '';
    const delay    = idx * 0.04;

    return `<a class="pcard" href="./dashboard.html?project=${id}" style="animation-delay:${delay}s">
      <div class="pcard-banner" style="${bg}">
        <div class="pcard-icon">${p.icon || '⬡'}</div>
      </div>
      <div class="pcard-body">
        <div class="pcard-name">${p.name}</div>
        <div class="pcard-tagline">${p.tagline || ''}</div>
        <div class="pcard-meta">
          ${created ? `<span class="pcard-date">${created}</span>` : ''}
          <span class="pcard-badge ${hasData ? 'has-data' : ''}">${hasData ? '● Data ready' : '○ No data'}</span>
        </div>
      </div>
    </a>`;
  }

  function newCard() {
    return `<div class="pcard-new" onclick="showNewProjectGuide()">
      <span class="pcard-new-icon">+</span>
      <span class="pcard-new-label">New project</span>
      <span class="pcard-new-hint">Copy _template/config.json</span>
    </div>`;
  }

  function renderNewCard(grid) {
    grid.insertAdjacentHTML('beforeend', newCard());
  }

  function filterProjects(query) {
    const q = query.toLowerCase();
    const filtered = ALL_PROJECTS.filter(({ id, cfg }) =>
      id.includes(q) ||
      cfg.project.name.toLowerCase().includes(q) ||
      (cfg.project.tagline || '').toLowerCase().includes(q)
    );
    renderGrid(filtered);
  }

  function showNewProjectGuide() {
    alert(`To create a new project:\n\n1. Copy analyzer/projects/_template/config.json\n   → analyzer/projects/YOUR_ID/config.json\n\n2. Edit config.json (name, data paths, targets)\n\n3. Add your videos.csv to projects/YOUR_ID/data/\n\n4. Run: python features/pipeline.py --product analyzer --project YOUR_ID --input ...\n5. Run: python AI/pipeline.py --product analyzer --project YOUR_ID --features ...\n\n6. Reload this page.`);
  }

  // Boot
  loadProjects();
  </script>
</body>
</html>
