<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="aether-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E8CD7E" stop-opacity="0.32"/>
      <stop offset="55%"  stop-color="#C4A96A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#C4A96A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aether-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8CD7E"/>
      <stop offset="60%"  stop-color="#C4A96A"/>
      <stop offset="100%" stop-color="#9E8650"/>
    </linearGradient>
    <radialGradient id="aether-particle" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F6E3A8"/>
      <stop offset="55%"  stop-color="#E8CD7E"/>
      <stop offset="100%" stop-color="#C4A96A"/>
    </radialGradient>
  </defs>

  <!-- Dark field -->
  <rect width="64" height="64" fill="#09090D"/>

  <!-- Aetherial glow -->
  <circle cx="32" cy="32" r="28" fill="url(#aether-glow)"/>

  <!-- Orbit (tilted ellipse) -->
  <g transform="rotate(-24 32 32)">
    <ellipse cx="32" cy="32" rx="22" ry="10.5"
             fill="none" stroke="url(#aether-ring)"
             stroke-width="1.6" stroke-linecap="round"
             opacity="0.92"/>
  </g>

  <!-- Central attractor -->
  <circle cx="32" cy="32" r="1.8" fill="#E8CD7E" opacity="0.9"/>

  <!-- Luminous particle on the orbit -->
  <circle cx="51.1" cy="23.2" r="4.8" fill="#C4A96A" opacity="0.18"/>
  <circle cx="51.1" cy="23.2" r="2.6" fill="url(#aether-particle)"/>
</svg>
