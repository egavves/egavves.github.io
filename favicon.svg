<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Dark background -->
  <rect width="256" height="256" fill="#09090D"/>
  
  <!-- Left robotic arm (torque) -->
  <g stroke="#C4A96A" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Upper arm segment angled down-left -->
    <line x1="64" y1="96" x2="32" y2="140"/>
    <!-- Elbow joint -->
    <circle cx="32" cy="140" r="6" fill="#C4A96A"/>
    <!-- Forearm segment -->
    <line x1="32" y1="140" x2="20" y2="180"/>
    <!-- Hand/gripper -->
    <circle cx="20" cy="180" r="5" fill="#C4A96A"/>
    <line x1="16" y1="174" x2="10" y2="168"/>
    <line x1="24" y1="186" x2="30" y2="192"/>
  </g>
  
  <!-- Right robotic arm (torque) -->
  <g stroke="#C4A96A" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Upper arm segment angled down-right -->
    <line x1="192" y1="96" x2="224" y2="140"/>
    <!-- Elbow joint -->
    <circle cx="224" cy="140" r="6" fill="#C4A96A"/>
    <!-- Forearm segment -->
    <line x1="224" y1="140" x2="236" y2="180"/>
    <!-- Hand/gripper -->
    <circle cx="236" cy="180" r="5" fill="#C4A96A"/>
    <line x1="240" y1="174" x2="246" y2="168"/>
    <line x1="232" y1="186" x2="226" y2="192"/>
  </g>
  
  <!-- Center φ (Phi) symbol -->
  <g fill="none" stroke="#C4A96A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical line (stem of phi) -->
    <line x1="128" y1="50" x2="128" y2="206"/>
    
    <!-- Circular loop (Greek phi characteristic shape) -->
    <circle cx="128" cy="110" r="48" fill="none"/>
  </g>
  
  <!-- Subtle rotation indicator (torque lines) -->
  <g stroke="#C4A96A" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round">
    <!-- Curved motion lines around phi -->
    <path d="M 88 70 Q 100 65 112 70" stroke-dasharray="4,4"/>
    <path d="M 168 70 Q 156 65 144 70" stroke-dasharray="4,4"/>
  </g>
</svg>
