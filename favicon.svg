<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Warm, sun-like orb with a hot core and a darker rim. -->
    <radialGradient id="orb-body" cx="36%" cy="30%" r="72%">
      <stop offset="0%"   stop-color="#FFE9B3"/>
      <stop offset="35%"  stop-color="#F4C86A"/>
      <stop offset="78%"  stop-color="#C58A3A"/>
      <stop offset="100%" stop-color="#6E3F13"/>
    </radialGradient>
    <radialGradient id="orb-moon" cx="35%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="60%"  stop-color="#FFE9B3"/>
      <stop offset="100%" stop-color="#E3B265"/>
    </radialGradient>
    <radialGradient id="orb-halo" cx="50%" cy="50%" r="50%">
      <stop offset="60%"  stop-color="#F4C86A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F4C86A" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <!-- Soft halo outside the orb. -->
  <circle cx="32" cy="32" r="31" fill="url(#orb-halo)"/>

  <!-- Main orb, nearly edge-to-edge, no dark square behind. -->
  <circle cx="32" cy="32" r="27" fill="url(#orb-body)"/>

  <!-- Specular highlight. -->
  <circle cx="22" cy="20" r="5.5" fill="#FFFFFF" opacity="0.28"/>

  <!-- Bright companion / luminous particle, top-right. -->
  <circle cx="50" cy="18" r="4.2" fill="url(#orb-moon)"/>
</svg>
