<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Dark background -->
  <rect width="256" height="256" fill="#09090D"/>
  
  <!-- Gradient definitions -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C4A96A;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#C4A96A;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Center glow -->
  <circle cx="128" cy="128" r="80" fill="url(#glow)"/>
  
  <!-- Central circle frame -->
  <circle cx="128" cy="128" r="70" fill="none" stroke="#C4A96A" stroke-width="2" opacity="0.3"/>
  
  <!-- PSI (Ψ) - Left side -->
  <g transform="translate(85, 128)">
    <!-- Vertical stem -->
    <line x1="0" y1="-35" x2="0" y2="25" stroke="#C4A96A" stroke-width="3" stroke-linecap="round"/>
    <!-- Left prong -->
    <path d="M -15 -20 Q -20 -10 -15 5" fill="none" stroke="#C4A96A" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right prong -->
    <path d="M 15 -20 Q 20 -10 15 5" fill="none" stroke="#C4A96A" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Bottom hook -->
    <path d="M 0 25 Q 8 35 0 40" fill="none" stroke="#C4A96A" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- PHI (Φ) - Center -->
  <g transform="translate(128, 128)">
    <!-- Vertical stem through circle -->
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#C4A96A" stroke-width="3" stroke-linecap="round"/>
    <!-- Circle loop -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#C4A96A" stroke-width="2.5"/>
  </g>
  
  <!-- IOTA (Ι) - Right side -->
  <g transform="translate(171, 128)">
    <!-- Vertical line -->
    <line x1="0" y1="-35" x2="0" y2="35" stroke="#C4A96A" stroke-width="3" stroke-linecap="round"/>
    <!-- Top serif -->
    <line x1="-8" y1="-35" x2="8" y2="-35" stroke="#C4A96A" stroke-width="2" stroke-linecap="round"/>
    <!-- Bottom serif -->
    <line x1="-8" y1="35" x2="8" y2="35" stroke="#C4A96A" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Robot arm connectors (bronze effectors) -->
  <!-- Left arm -->
  <g stroke="#C4A96A" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 60 128 L 40 110 L 35 100" />
    <circle cx="35" cy="100" r="3" fill="#C4A96A"/>
  </g>
  
  <!-- Right arm -->
  <g stroke="#C4A96A" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 196 128 L 216 110 L 221 100" />
    <circle cx="221" cy="100" r="3" fill="#C4A96A"/>
  </g>
  
  <!-- Bottom torque indicators -->
  <g stroke="#C4A96A" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M 115 165 Q 115 180 128 185" stroke-dasharray="3,2"/>
    <path d="M 141 165 Q 141 180 128 185" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Subtle corner dots (circuit aesthetic) -->
  <circle cx="30" cy="30" r="2" fill="#C4A96A" opacity="0.4"/>
  <circle cx="226" cy="30" r="2" fill="#C4A96A" opacity="0.4"/>
  <circle cx="30" cy="226" r="2" fill="#C4A96A" opacity="0.4"/>
  <circle cx="226" cy="226" r="2" fill="#C4A96A" opacity="0.4"/>
</svg>
