<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="s-body" cx="36%" cy="30%" r="72%">
      <stop offset="0%"   stop-color="#FFE9B3"/>
      <stop offset="45%"  stop-color="#F0BE5A"/>
      <stop offset="100%" stop-color="#7A4A1F"/>
    </radialGradient>
    <radialGradient id="s-moon" cx="35%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="70%"  stop-color="#FFE0A0"/>
      <stop offset="100%" stop-color="#D8A155"/>
    </radialGradient>
  </defs>

  <!-- Bold orb fills almost the entire icon — no dark square behind. -->
  <circle cx="16" cy="16" r="14" fill="url(#s-body)"/>

  <!-- Luminous companion dot, top-right. -->
  <circle cx="25" cy="9" r="2.4" fill="url(#s-moon)"/>
</svg>
